# root docker-compose.yml
version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: aiqa_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    # Ports not exposed to host for security, accessed via internal network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aiqa_backend
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - MONGO_URL=${MONGO_URL}
      - MONGO_DB_NAME=aiqa_db
      - REDIS_URL=redis://redis:6379
      - GROQ_API_KEY=${GROQ_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=http://localhost
      - DEBUG=false
      - UPLOAD_DIR=/app/uploads
      - INDEX_DIR=/app/indexes
    volumes:
      - uploads:/app/uploads
      - indexes:/app/indexes

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aiqa_frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: aiqa_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  redis_data:
  uploads:
  indexes: