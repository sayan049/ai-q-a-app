# .github/workflows/cd.yml
name: CD — Build & Prepare for Deployment

on:
  push:
    branches: [main]
  # Only run after CI (Test & Lint) passes
  workflow_run:
    workflows: ["CI — Test & Lint"]
    types: [completed]
    branches: [main]

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false # Set to true if you connect DockerHub/GHCR
          tags: ai-qa-backend:latest

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: ai-qa-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Status
        run: echo "Production images built successfully. Ready for deployment to Render/Railway."